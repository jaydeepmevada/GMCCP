version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: gmccp-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: gmccp
    volumes:
      - mongo_data:/data/db
    networks:
      - gmccp-network

networks:
  gmccp-network:
    driver: bridge

volumes:
  mongo_data:
